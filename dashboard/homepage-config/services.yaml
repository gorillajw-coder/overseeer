---
# For configuration options and examples, please see:
# https://gethomepage.dev/configs/services/

- Overseeer:
    - Alert:
        id: alert
        href: "#"
        icon: mdi-alert-#facc15
        widget:
          type: customapi
          url: http://127.0.0.1:8010/api/issues
          display: dynamic-list
          mappings:
            items: issues
            name: label
            label: detail

    - Project Status:
        id: progress
        href: "#"
        widget:
          type: customapi
          url: http://127.0.0.1:8010/api/progress
          display: dynamic-list
          mappings:
            items: projects
            name: label
            label: date

    - Git Sync:
        id: git-sync
        href: "#"
        widget:
          type: customapi
          url: http://127.0.0.1:8010/api/git
          display: dynamic-list
          mappings:
            items: projects
            name: label
            label: summary

    - Tracked Services:
        id: tracked-services
        href: "#"
        widget:
          type: customapi
          url: http://127.0.0.1:8010/api/services
          display: dynamic-list
          mappings:
            items: tracked_visible
            name: label
            label: state

    - Cron Services:
        id: cron
        href: "#"
        widget:
          type: customapi
          url: http://127.0.0.1:8010/api/cron
          display: dynamic-list
          mappings:
            items: jobs
            name: label
            label: schedule

- Quick Links:
    - EOCS:
        href: https://gnoll.tplinkdns.com/
        description: CV builder

    - FileManager:
        href: https://gnoll.tplinkdns.com/filemanager/
        description: 파일 관리

    - WB Job Dashboard:
        href: https://gnoll.tplinkdns.com/wb/
        description: 채용 공고 대시보드

    - Netdata:
        href: http://homeserver:19999/
        description: 리소스/서비스 상세 모니터링 (Tailscale MagicDNS)

- Unregistered Process:
    - Unregistered Process:
        id: orphans
        href: "#"
        description: 리스닝 포트를 열었지만 systemd 유닛에 등록 안 된 프로세스 — 있으면 확인 필요
        widget:
          type: customapi
          url: http://127.0.0.1:8010/api/services
          display: dynamic-list
          mappings:
            items: orphans
            name: cmdline
            label: port
