---
# For configuration options and examples, please see:
# https://gethomepage.dev/configs/services/

- Overseeer:
    - Alert:
        id: alert
        href: "#"
        icon: mdi-alert-#facc15
        widget:
          type: customapi
          url: http://127.0.0.1:8010/api/issues
          display: dynamic-list
          mappings:
            items: issues
            name: label
            label: detail

    - Project Status:
        id: progress
        href: "#"
        widget:
          type: customapi
          url: http://127.0.0.1:8010/api/progress
          display: dynamic-list
          mappings:
            items: projects
            name: label
            label: date

    - Git Sync:
        id: git-sync
        href: "#"
        widget:
          type: customapi
          url: http://127.0.0.1:8010/api/git
          display: dynamic-list
          mappings:
            items: projects
            name: label
            label: summary

    - Tracked Services:
        id: tracked-services
        href: "#"
        widget:
          type: customapi
          url: http://127.0.0.1:8010/api/services
          display: dynamic-list
          mappings:
            items: tracked_visible
            name: label
            label: state

    - Cron Services:
        id: cron
        href: "#"
        widget:
          type: customapi
          url: http://127.0.0.1:8010/api/cron
          display: dynamic-list
          mappings:
            items: jobs
            name: label
            label: schedule

- Quick Links:
    - EOCS:
        href: http://100.72.47.109:9080/
        description: CV builder (Caddy → :9000)

    - FileManager:
        href: http://100.72.47.109/filemanager/
        description: 파일 관리 (Caddy → :8100)

    - Glances:
        href: http://100.72.47.109:61208/
        description: gnollramy 리소스 모니터

    - Netdata (old homeserver):
        href: http://homeserver:19999/
        description: 옛 홈서버 Netdata (TS MagicDNS)

- Unregistered Process:
    - Unregistered Process:
        id: orphans
        href: "#"
        description: 리스닝 포트를 열었지만 systemd 유닛에 등록 안 된 프로세스 — 있으면 확인 필요
        widget:
          type: customapi
          url: http://127.0.0.1:8010/api/services
          display: dynamic-list
          mappings:
            items: orphans
            name: cmdline
            label: port
